<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email QA Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ff:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--bg:#08080f;--card:rgba(255,255,255,0.015);--border:rgba(255,255,255,0.04);--text:#d4d4dc}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh}
::selection{background:rgba(167,139,250,0.3)}input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2)}
textarea:focus,input:focus{outline:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim{animation:fadeUp .45s ease-out both}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.glow{background:linear-gradient(90deg,#6d28d9,#7c3aed,#a78bfa,#7c3aed,#6d28d9);background-size:200% 100%;animation:shimmer 2.5s ease-in-out infinite}
.hdr{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(8,8,15,0.94);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.hdr-in{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6d28d9,#7c3aed);font-size:11px;font-weight:800;color:#fff}
.wrap{max-width:820px;margin:0 auto;padding:28px 24px;display:flex;flex-direction:column;gap:22px}
.wrapw{max-width:860px;margin:0 auto;padding:28px 24px 60px;display:flex;flex-direction:column;gap:16px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;opacity:0.3;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inp{width:100%;padding:11px 14px;border-radius:10px;font-size:13px;font-family:var(--mono);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);color:inherit}
.inp.over{border-color:rgba(248,113,113,0.3)}
.dz{border:2px dashed rgba(255,255,255,0.07);border-radius:14px;padding:36px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.01)}
.dz.ok{border:1px solid rgba(52,211,153,0.2);padding:16px}
.mb{padding:4px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.05);background:transparent;color:rgba(255,255,255,0.35)}
.mb.on{border-color:rgba(124,58,237,0.4);background:rgba(124,58,237,0.1);color:#a78bfa}
.rb{width:100%;padding:15px 0;border-radius:13px;font-size:14px;font-weight:700;font-family:var(--ff);border:none;color:#fff;cursor:pointer}
.rb:disabled{opacity:0.3;cursor:not-allowed;background:rgba(255,255,255,0.04)}
.cd{padding:18px 22px;border-radius:14px;border:1px solid var(--border);background:var(--card)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sec{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card)}
.sh{width:100%;display:flex;align-items:center;gap:12px;padding:14px 20px;background:none;border:none;color:inherit;cursor:pointer;text-align:left}
.sb{padding:0 20px 20px;display:flex;flex-direction:column;gap:10px}
.pl{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:550}
.ec{padding:12px;border-radius:10px;border:1px solid rgba(248,113,113,0.08);background:rgba(248,113,113,0.03)}
.wc{padding:12px;border-radius:10px;border:1px solid rgba(251,191,36,0.08);background:rgba(251,191,36,0.03)}
.ic{padding:12px;border-radius:10px;border:1px solid rgba(96,165,250,0.08);background:rgba(96,165,250,0.03)}
.nc{padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.02)}
.pc{padding:18px;border-radius:14px;border:1px solid rgba(167,139,250,0.08);background:rgba(167,139,250,0.03)}
.as{margin-top:5px;padding:7px 12px;border-radius:8px;background:rgba(124,58,237,0.05);border:1px solid rgba(124,58,237,0.08);font-size:12px;font-family:var(--mono)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tl{position:relative;padding-left:18px;border-left:2px solid rgba(124,58,237,0.12)}
.td{position:absolute;left:-24px;top:12px;width:10px;height:10px;border-radius:50%;border:2px solid #7c3aed;background:#08080f}
.eb{padding:14px;border-radius:12px;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.12);color:#f87171;font-size:13px}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.tb{text-align:left;padding:14px 18px;border-radius:12px;cursor:pointer;color:inherit;border:1px solid var(--border);background:var(--card)}
.tb.on{border-color:rgba(124,58,237,0.4);background:rgba(124,58,237,0.06)}
@media(max-width:640px){.g2,.tg{grid-template-columns:1fr}.sg{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body><div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useRef,useCallback}=React;
const T={basic:{name:"Basic Template",desc:"Simple message GTM campaigns. Visually led, minimal copy.",rules:["Subject line: Hook within 33 chars","Preheader: Hook within 37 chars","Title H1: 2-6 words","Image: S 680x450, M 680x680, L 680x1000","Body: Brief and to the point","CTA: 1-3 words","Visually led, minimal copy"],modules:["Simple content (title only)","Basic image","Simple content (no title)","Product card w/ background","Disclaimer","Headline + sub copy","Simple image + content"]},lux:{name:"Lux Template",desc:"Immersive visual design for brand announcements and launches.",rules:["Subject line: Hook within 33 chars","Preheader: Hook within 37 chars","Dynamic Module H1: 2-6 words","Image: S 700x400, M 700x700, L 700x900","Description: Brief","CTA: 1-3 words","Sub copy H2: 2-6 words","Card icon: 110x110","Half card image: 350x440","Full card image: 630x400"],modules:["Dynamic Module","Sub copy","Product card w/ background","Half and Half card","Quadrant 1x2","Full Card","Image","Disclaimer"]}};
function bp(t,s,p){const v=T[t];return["You are an expert Email QA Agent for OKX (crypto/fintech).","TEMPLATE: "+v.name+". "+v.desc,"RULES: "+v.rules.join("; "),"MODULES: "+v.modules.join(", "),"NOTE: Company does NOT use brand logos in emails. Never flag missing logos.","QA: Check spelling, grammar, tone, CTA clarity, no placeholders, copy matches brief, URLs correct (www.okx.com vs my.okx.com), HTTPS, punctuation, fonts, spacing, no orphans, images display, alt text, responsive, dark mode, unsubscribe links, preheader not repeating subject, no internal notes.","LIFECYCLE: Lifecycle-First model. Launch Spike Wk1-2, Echo Nurture Wk3-6, Owners Manual Wk1-6+, Evergreen Resurfacing Mo2-6+. Non-converter: +7d benefit, +14d proof, +21d objections, +30d downsell. Converter: immediate celebrate, +3d quick win, +10d advanced, +30d feedback.",s?"SUBJECT LINE: "+JSON.stringify(s)+" ("+s.length+"/33)":"",p?"PREHEADER: "+JSON.stringify(p)+" ("+p.length+"/37)":"",`Return ONLY JSON: {"overallScore":<1-10>,"scoreBreakdown":{"copyQuality":<1-10>,"visualDesign":<1-10>,"templateCompliance":<1-10>,"ctaEffectiveness":<1-10>,"subjectLineScore":<1-10>},"subjectLineReview":{"charCount":<n>,"withinLimit":<bool>,"feedback":"...","suggestions":["...","..."]},"preheaderReview":{"charCount":<n>,"withinLimit":<bool>,"feedback":"...","suggestions":["...","..."]},"grammarErrors":[{"text":"...","issue":"...","suggestion":"..."}],"copyImprovements":[{"area":"...","current":"...","suggestion":"...","reason":"..."}],"visualImprovements":[{"area":"...","issue":"...","suggestion":"..."}],"layoutImprovements":[{"area":"...","issue":"...","suggestion":"..."}],"templateComplianceIssues":[{"rule":"...","detail":"..."}],"abTests":[{"name":"...","type":"subject line|copy variation|CTA placement","variantA":"...","variantB":"...","hypothesis":"...","expectedImpact":"..."}],"lifecycleCadenceSuggestions":[{"timing":"...","theme":"...","audience":"...","content":"..."}],"summary":"..."}`,"Give exactly 3 A/B tests: 1 subject line, 1 copy, 1 CTA."].filter(Boolean).join("\n\n")}
const b64=f=>new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(",")[1]);r.onerror=()=>no(new Error("fail"));r.readAsDataURL(f)});
function CC({n,max}){const c=n>max?"#f87171":n>max*.85?"#fbbf24":"rgba(255,255,255,0.25)";return<span style={{fontSize:11,fontWeight:600,fontFamily:"var(--mono)",color:c}}>{n}/{max}</span>}
function Ring({score,size=100,label}){const rd=(size-12)/2,c=2*Math.PI*rd,off=c-(score/10)*c;const col=score>=8?"#34d399":score>=6?"#fbbf24":score>=4?"#fb923c":"#f87171";return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={rd} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="5"/><circle cx={size/2} cy={size/2} r={rd} fill="none" stroke={col} strokeWidth="5" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s ease-out"}}/></svg><div style={{position:"absolute",width:size,height:size,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontWeight:700,color:col,fontSize:size*.28}}>{score}</span><span style={{fontSize:size*.11,opacity:.3}}>/10</span></div>{label&&<span style={{fontSize:10,opacity:.45,textAlign:"center",lineHeight:1.2,maxWidth:size}}>{label}</span>}</div>}
function Pl({v="default",children}){const c={error:"#f87171",warning:"#fbbf24",success:"#34d399",info:"#60a5fa",purple:"#a78bfa",default:"rgba(255,255,255,0.5)"}[v]||"rgba(255,255,255,0.5)";return<span className="pl" style={{background:c+"18",color:c,border:"1px solid "+c+"25"}}>{children}</span>}
function Sc({icon,title,pill,children,open:d=false}){const[o,sO]=useState(d);return<div className="sec"><button className="sh" onClick={()=>sO(!o)}><span style={{fontSize:15}}>{icon}</span><span style={{flex:1,fontWeight:600,fontSize:13}}>{title}</span>{pill}<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{opacity:.3,transform:o?"rotate(180deg)":"none",transition:"transform .2s"}}><path d="M6 9l6 6 6-6"/></svg></button>{o&&<div className="sb">{children}</div>}</div>}

function App(){
const[step,setStep]=useState("upload");const[img,setImg]=useState(null);const[ip,setIp]=useState(null);
const[bm,setBm]=useState("paste");const[bt,setBt]=useState("");const[bf,setBf]=useState(null);const[bn,setBn]=useState("");
const[sl,setSl]=useState("");const[ph,setPh]=useState("");const[tm,setTm]=useState("basic");
const[ld,setLd]=useState(false);const[res,setRes]=useState(null);const[er,setEr]=useState(null);const[pg,setPg]=useState("");
const iR=useRef(null);const bR=useRef(null);
const oI=useCallback(e=>{const f=e.target.files?.[0];if(!f)return;setImg(f);const r=new FileReader();r.onload=ev=>setIp(ev.target.result);r.readAsDataURL(f)},[]);
const oB=useCallback(e=>{const f=e.target.files?.[0];if(!f)return;setBf(f);setBn(f.name);if(f.type==="text/plain"||f.name.endsWith(".txt")){const r=new FileReader();r.onload=ev=>setBt(ev.target.result);r.readAsText(f)}},[]);
const oD=useCallback((e,t)=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;if(t==="img"&&f.type.startsWith("image/")){setImg(f);const r=new FileReader();r.onload=ev=>setIp(ev.target.result);r.readAsDataURL(f)}else if(t==="brief"){setBf(f);setBn(f.name)}},[]);
const run=async()=>{const hb=bm==="paste"?bt.trim():bf;if(!img||!hb)return;setLd(true);setEr(null);setPg("Preparing...");
try{const ib=await b64(img);const ct=[{type:"image",source:{type:"base64",media_type:img.type||"image/png",data:ib}}];
if(bm==="upload"&&bf){if(bf.type==="application/pdf"){const bb=await b64(bf);ct.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:bb}});ct.push({type:"text",text:"COPY BRIEF: See PDF.\nSUBJECT LINE: "+JSON.stringify(sl)+"\nPREHEADER: "+JSON.stringify(ph)+"\nFull QA. ONLY JSON."})}else if(bf.type.startsWith("image/")){const bb=await b64(bf);ct.push({type:"image",source:{type:"base64",media_type:bf.type,data:bb}});ct.push({type:"text",text:"COPY BRIEF: 2nd image is brief.\nSUBJECT LINE: "+JSON.stringify(sl)+"\nPREHEADER: "+JSON.stringify(ph)+"\nFull QA. ONLY JSON."})}else{ct.push({type:"text",text:"COPY BRIEF:\n"+bt+"\nSUBJECT LINE: "+JSON.stringify(sl)+"\nPREHEADER: "+JSON.stringify(ph)+"\nFull QA. ONLY JSON."})}}else{ct.push({type:"text",text:"COPY BRIEF:\n"+bt+"\nSUBJECT LINE: "+JSON.stringify(sl)+"\nPREHEADER: "+JSON.stringify(ph)+"\nFull QA. ONLY JSON."})}
setPg("Running QA \u2014 ~20-30 seconds...");
const rp=await fetch("/.netlify/functions/qa-analyse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:bp(tm,sl,ph),messages:[{role:"user",content:ct}]})});
if(!rp.ok)throw new Error("API error "+rp.status);const d=await rp.json();const tx=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
setRes(JSON.parse(tx.replace(/```json|```/g,"").trim()));setStep("results")}catch(e){setEr("Failed: "+e.message)}finally{setLd(false);setPg("")}};
const reset=()=>{setStep("upload");setImg(null);setIp(null);setBt("");setBf(null);setBn("");setSl("");setPh("");setRes(null);setEr(null)};
const ax=(s,i)=><div key={i} className="as">{s}</div>;

if(step==="upload"){const ok=img&&(bm==="paste"?bt.trim():bf);
return<><div className="hdr"><div className="hdr-in"><div style={{display:"flex",alignItems:"center",gap:12}}><div className="logo">QA</div><div><div style={{fontSize:14,fontWeight:700}}>Email QA Agent</div><div style={{fontSize:11,opacity:.3}}>Upload &bull; Review &bull; Optimise</div></div></div></div></div>
<div className="wrap">
<div className="anim"><div className="lbl">Template Type</div><div className="g2">{Object.entries(T).map(([k,s])=><button key={k} onClick={()=>setTm(k)} className={"tb"+(tm===k?" on":"")}><div style={{fontSize:13,fontWeight:650}}>{s.name}</div><div style={{fontSize:11,opacity:.4,marginTop:3,lineHeight:1.4}}>{s.desc}</div></button>)}</div></div>
<div className="anim d1"><div className="lbl">Subject Line &amp; Preheader</div><div className="g2" style={{gap:12}}><div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><label style={{fontSize:11,fontWeight:600,opacity:.5}}>Subject Line</label><CC n={sl.length} max={33}/></div><input value={sl} onChange={e=>setSl(e.target.value)} placeholder="Enter subject line..." className={"inp"+(sl.length>33?" over":"")}/></div><div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><label style={{fontSize:11,fontWeight:600,opacity:.5}}>Preheader</label><CC n={ph.length} max={37}/></div><input value={ph} onChange={e=>setPh(e.target.value)} placeholder="Enter preheader text..." className={"inp"+(ph.length>37?" over":"")}/></div></div></div>
<div className="anim d2"><div className="lbl">Email Screenshot</div><div className={"dz"+(ip?" ok":"")} onClick={()=>iR.current?.click()} onDrop={e=>oD(e,"img")} onDragOver={e=>e.preventDefault()}><input ref={iR} type="file" accept="image/*" onChange={oI} style={{display:"none"}}/>{ip?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><img src={ip} alt="" style={{maxHeight:200,borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.4)"}}/><span style={{fontSize:11,color:"#34d399"}}>{"\u2713 Uploaded \u2014 click to replace"}</span></div>:<div><div style={{fontSize:26,opacity:.2,marginBottom:6}}>{"\uD83D\uDCE7"}</div><div style={{fontSize:13,opacity:.45}}>Drop email screenshot or click to upload</div><div style={{fontSize:11,opacity:.2,marginTop:3}}>PNG, JPG, WebP</div></div>}</div></div>
<div className="anim d3"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div className="lbl" style={{marginBottom:0}}>Copy Brief</div><div style={{display:"flex",gap:4}}>{[["paste","Paste text"],["upload","Upload file"]].map(([m,l])=><button key={m} onClick={()=>setBm(m)} className={"mb"+(bm===m?" on":"")}>{l}</button>)}</div></div>{bm==="paste"?<textarea value={bt} onChange={e=>setBt(e.target.value)} placeholder={"Paste the copy brief here...\n\nInclude body copy, CTAs, audience, objective..."} style={{width:"100%",height:170,padding:14,borderRadius:12,fontSize:12.5,fontFamily:"var(--mono)",background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",color:"inherit",resize:"none",lineHeight:1.6}}/>:<div className={"dz"+(bf?" ok":"")} onClick={()=>bR.current?.click()} onDrop={e=>oD(e,"brief")} onDragOver={e=>e.preventDefault()} style={{padding:bf?16:28}}><input ref={bR} type="file" accept=".pdf,.png,.jpg,.jpeg,.txt,.md" onChange={oB} style={{display:"none"}}/>{bf?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><span style={{fontSize:26}}>{"\uD83D\uDCC4"}</span><span style={{fontSize:13,fontWeight:600}}>{bn}</span><span style={{fontSize:11,color:"#34d399"}}>{"\u2713 Uploaded \u2014 click to replace"}</span></div>:<div><div style={{fontSize:26,opacity:.2,marginBottom:6}}>{"\uD83D\uDCC4"}</div><div style={{fontSize:13,opacity:.45}}>Drop brief or click to upload</div><div style={{fontSize:11,opacity:.2,marginTop:3}}>PDF, PNG, JPG, TXT \u2014 Export from Lark as PDF</div></div>}</div>}</div>
{er&&<div className="eb">{er}</div>}
<div className="anim d4"><button onClick={run} disabled={!ok||ld} className={"rb"+(ok&&!ld?" glow":"")}>{ld?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span className="sp"></span>{pg}</span>:"Run QA Analysis"}</button></div>
</div></>}

if(step==="results"&&res){const r=res;
return<><div className="hdr"><div className="hdr-in"><div style={{display:"flex",alignItems:"center",gap:12}}><div className="logo">QA</div><div><div style={{fontSize:14,fontWeight:700}}>QA Results</div><div style={{fontSize:11,opacity:.3}}>{T[tm].name} &bull; {new Date().toLocaleDateString()}</div></div></div><button onClick={reset} style={{padding:"7px 16px",borderRadius:9,fontSize:12,fontWeight:600,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",color:"inherit",cursor:"pointer"}}>&larr; New Review</button></div></div>
<div className="wrapw">
<div className="anim cd"><p style={{fontSize:14,lineHeight:1.7,opacity:.75}}>{r.summary}</p></div>
<div className="anim d1 cd" style={{padding:24}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20}}><div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}><Ring score={r.overallScore} size={120}/></div><span style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.5,opacity:.25,marginTop:10}}>Overall Score</span></div>{r.scoreBreakdown&&<div className="sg">{Object.entries(r.scoreBreakdown).map(([k,v])=><div key={k} style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}><Ring score={v} size={68} label={k.replace(/([A-Z])/g," $1").trim()}/></div>)}</div>}</div>
{(r.subjectLineReview||r.preheaderReview)&&<Sc icon={"\u2709\uFE0F"} title="Subject Line & Preheader" pill={<Pl v={r.subjectLineReview?.withinLimit&&r.preheaderReview?.withinLimit?"success":"warning"}>{r.subjectLineReview?.withinLimit&&r.preheaderReview?.withinLimit?"Within limits":"Check limits"}</Pl>} open={true}>{r.subjectLineReview&&<div className="nc"><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,fontWeight:650}}>Subject Line</span><Pl v={r.subjectLineReview.withinLimit?"success":"error"}>{r.subjectLineReview.charCount}/33</Pl></div><p style={{fontSize:12,opacity:.6,lineHeight:1.6}}>{r.subjectLineReview.feedback}</p>{r.subjectLineReview.suggestions?.length>0&&<div style={{marginTop:8}}><span style={{fontSize:10,fontWeight:600,opacity:.35,textTransform:"uppercase",letterSpacing:1}}>Alternatives</span>{r.subjectLineReview.suggestions.map(ax)}</div>}</div>}{r.preheaderReview&&<div className="nc"><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,fontWeight:650}}>Preheader</span><Pl v={r.preheaderReview.withinLimit?"success":"error"}>{r.preheaderReview.charCount}/37</Pl></div><p style={{fontSize:12,opacity:.6,lineHeight:1.6}}>{r.preheaderReview.feedback}</p>{r.preheaderReview.suggestions?.length>0&&<div style={{marginTop:8}}><span style={{fontSize:10,fontWeight:600,opacity:.35,textTransform:"uppercase",letterSpacing:1}}>Alternatives</span>{r.preheaderReview.suggestions.map(ax)}</div>}</div>}</Sc>}
