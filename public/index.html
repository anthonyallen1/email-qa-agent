<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email QA Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ff:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--bg:#000;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text:#f0f0f0;--dim:rgba(255,255,255,0.4);--accent:#BCFF2F;--accent-dim:rgba(188,255,47,0.15);--accent-border:rgba(188,255,47,0.3)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh}
::selection{background:rgba(188,255,47,0.3)}input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.25)}
textarea:focus,input:focus{outline:none;border-color:var(--accent-border)!important}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
.anim{animation:fadeUp .5s ease-out both}.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}
.glow{background:linear-gradient(90deg,#7a9c00,#BCFF2F,#d4ff73,#BCFF2F,#7a9c00);background-size:200% 100%;animation:shimmer 2.5s ease-in-out infinite;color:#000}
.hdr{padding:18px 28px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.hdr-in{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.wrap{max-width:900px;margin:0 auto;padding:32px 28px;display:flex;flex-direction:column;gap:26px}
.wrapw{max-width:940px;margin:0 auto;padding:32px 28px 70px;display:flex;flex-direction:column;gap:20px}
.lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;opacity:0.35;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.inp{width:100%;padding:13px 16px;border-radius:11px;font-size:15px;font-family:var(--mono);background:rgba(255,255,255,0.04);border:1px solid var(--border);color:inherit;transition:border-color .2s}
.inp.over{border-color:rgba(248,113,113,0.4)}
.dz{border:2px dashed rgba(255,255,255,0.1);border-radius:16px;padding:42px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.015);transition:border-color .2s}
.dz:hover{border-color:var(--accent-border)}
.dz.ok{border:1px solid rgba(188,255,47,0.25);padding:18px;background:rgba(188,255,47,0.03)}
.mb{padding:5px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .15s}
.mb.on{border-color:var(--accent-border);background:var(--accent-dim);color:var(--accent)}
.rb{width:100%;padding:17px 0;border-radius:14px;font-size:16px;font-weight:700;font-family:var(--ff);border:none;cursor:pointer;transition:opacity .2s}
.rb:disabled{opacity:0.3;cursor:not-allowed;background:rgba(255,255,255,0.04);color:#fff}
.cd{padding:22px 26px;border-radius:16px;border:1px solid var(--border);background:var(--card)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sec{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card)}
.sh{width:100%;display:flex;align-items:center;gap:14px;padding:16px 22px;background:none;border:none;color:inherit;cursor:pointer;text-align:left;font-size:15px}
.sb{padding:0 22px 22px;display:flex;flex-direction:column;gap:12px}
.pl{display:inline-block;padding:3px 12px;border-radius:99px;font-size:12px;font-weight:600}
.ec{padding:14px;border-radius:12px;border:1px solid rgba(248,113,113,0.1);background:rgba(248,113,113,0.04)}
.wc{padding:14px;border-radius:12px;border:1px solid rgba(251,191,36,0.1);background:rgba(251,191,36,0.04)}
.ic{padding:14px;border-radius:12px;border:1px solid rgba(188,255,47,0.1);background:rgba(188,255,47,0.04)}
.nc{padding:14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.025)}
.pc{padding:20px;border-radius:16px;border:1px solid rgba(188,255,47,0.12);background:rgba(188,255,47,0.04)}
.as{margin-top:6px;padding:8px 14px;border-radius:9px;background:rgba(188,255,47,0.06);border:1px solid rgba(188,255,47,0.1);font-size:14px;font-family:var(--mono)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tl{position:relative;padding-left:20px;border-left:2px solid rgba(188,255,47,0.15)}
.td{position:absolute;left:-25px;top:14px;width:11px;height:11px;border-radius:50%;border:2px solid var(--accent);background:#000}
.eb{padding:16px;border-radius:14px;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.15);color:#f87171;font-size:15px}
.sp{width:18px;height:18px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.tb{text-align:left;padding:16px 20px;border-radius:14px;cursor:pointer;color:inherit;border:1px solid var(--border);background:var(--card);transition:all .15s}
.tb.on{border-color:var(--accent-border);background:var(--accent-dim)}
.splash{position:fixed;inset:0;z-index:999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease-out}
.splash.hide{opacity:0;pointer-events:none}
.splash video{max-width:280px}
@media(max-width:640px){.g2,.tg{grid-template-columns:1fr}.sg{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
